<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Asset - JTDI Asset Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a2a6c; --gold: #ffc107; --light: #f8f9fa; --dark-bg: #1a1a2e; --dark-card: #16213e; --dark-text: #e0e0e0; }
        body { background-color: var(--light); font-family: 'Inter', system-ui, -apple-system, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { background-color: var(--dark-bg); color: var(--dark-text); }
        body.dark-mode .card { background-color: var(--dark-card); color: var(--dark-text); }
        body.dark-mode .form-control, body.dark-mode .form-select { background-color: #1e1e3f; color: var(--dark-text); border-color: #3a3a5c; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px 10px 0 0 !important; font-weight: 600; }
        .form-label { font-weight: 500; color: #333; }
        body.dark-mode .form-label { color: var(--dark-text); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    {% set active_page = 'add' %}
    {% include '_navbar.html' with context %}

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-plus-circle"></i> Add New Asset
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" action="{{ url_for('add_asset') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="asset_type" class="form-label">Asset Type</label>
                                    <select class="form-select" id="asset_type" name="asset_type" required>
                                        <option value="">Select Type</option>
                                        <option value="Laptop">Laptop</option>
                                        <option value="Desktop">Desktop</option>
                                        <option value="Monitor">Monitor</option>
                                        <option value="Printer">Printer</option>
                                        <option value="Server">Server</option>
                                        <option value="Network Equipment">Network Equipment</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="tracking_number" class="form-label">Tracking Number</label>
                                    <input type="text" class="form-control" id="tracking_number" name="tracking_number" placeholder="Auto-generated if empty">
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="serial_number" class="form-label">Serial Number *</label>
                                    <input type="text" class="form-control" id="serial_number" name="serial_number" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="cpu_name" class="form-label">Brand Name</label>
                                    <input type="text" class="form-control" id="cpu_name" name="cpu_name" placeholder="e.g., Dell, HP, Lenovo">
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="ram_size" class="form-label">RAM Size</label>
                                    <input type="text" class="form-control" id="ram_size" name="ram_size" placeholder="e.g., 16GB">
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="storage_type" class="form-label">Storage Type</label>
                                    <input type="text" class="form-control" id="storage_type" name="storage_type" placeholder="e.g., 512GB SSD">
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="location" class="form-label">Location *</label>
                                    <input type="text" class="form-control" id="location" name="location" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label">Status *</label>
                                    <select class="form-select" id="status" name="status" required>
                                        <option value="Working">Working</option>
                                        <option value="Maintenance">Maintenance</option>
                                        <option value="Faulty">Faulty</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Additional details about the asset"></textarea>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{{ url_for('index') }}" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> Add Asset
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
        }

        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
