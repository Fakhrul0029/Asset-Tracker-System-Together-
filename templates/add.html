<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Asset - JTDI Asset Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #1a2a6c; --gold: #ffc107; --light: #f8f9fa; }
        body { background-color: var(--light); font-family: 'Inter', system-ui, sans-serif; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-radius: 12px; }
        .btn-primary { background-color: var(--navy); border-color: var(--navy); }
        .btn-primary:hover { background-color: #111d4a; border-color: #111d4a; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4 text-dark text-center">Register New Hardware Asset Parameter</h5>
                    
                    <form method="POST" action="/add">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Asset Type</label>
                                <select class="form-select" name="asset_type" required>
                                    <option value="Laptop">Laptop</option>
                                    <option value="Desktop">Desktop</option>
                                    <option value="Server">Server</option>
                                    <option value="Network">Network Device</option>
                                    <option value="Peripherals">Peripherals</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Serial Number</label>
                                <input type="text" class="form-control" name="serial_number" placeholder="e.g. SN-99120AS" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Tracking Number (Leave blank to auto-generate)</label>
                                <input type="text" class="form-control" name="tracking_number" placeholder="JTDI-XXXXXXXXXX">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Owner Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="owner_name" placeholder="Enter designated structural owner name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">CPU Model Infrastructure</label>
                                <input type="text" class="form-control" name="cpu_name" placeholder="Intel i7 / Apple M2">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">RAM Config Capacity</label>
                                <input type="text" class="form-control" name="ram_size" placeholder="16GB / 32GB">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Storage Infrastructure</label>
                                <input type="text" class="form-control" name="storage_type" placeholder="512GB NVMe SSD">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Operational Status State</label>
                                <select class="form-select" name="status" required>
                                    <option value="Working">Working</option>
                                    <option value="Maintenance">Maintenance</option>
                                    <option value="Faulty">Faulty</option>
                                    <option value="Available">Available</option>
                                    <option value="Archived">Archived</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Physical Room/Office Location</label>
                                <input type="text" class="form-control" name="location" placeholder="e.g. Server Room B" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Hardware Detailed Description Logs</label>
                                <textarea class="form-control" name="description" rows="3" placeholder="Enter asset context details..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="/" class="btn btn-sm btn-light">Back To Grid</a>
                            <button type="submit" class="btn btn-sm btn-primary px-4">Save Configuration</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
